<!DOCTYPE html>

<html lang="en">

  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="main.css">
    <script type="text/javascript" src="quotes.js"> </script>
    <script type="text/javascript" src="main.js" defer> </script>
    <title>tracker</title>
  </head>

  <body class="bg-[#212529] text-white h-100%">
    <div id="container" class="
             min-h-screen
             flex flex-col gap-4
             items-center justify-center
             text-center
             ">
      <header class="text-center mb-6">
        <h1 class="text-3xl font-bold tracking-wide bg-gradient-to-r from-indigo-400 via-violet-400 to-fuchsia-400 text-transparent bg-clip-text">
          Workout Tracker
        </h1>

        <p id="quote" class="text-sm text-gray-400 mt-1"></p>
      </header>
      <div>
        <table class="
                      w-full max-w-md rounded-2xl bg-[#343A40] 
                      text-white overflow-hidden
                      ">
          <tr>
            <td>Total</td>
            <td id="count">Value</td>
          </tr>
          <tr>
            <td>Streak</td>
            <td id="streak">Value</td>
          </tr>
        </table>
      </div>
      <div class="flex flex-row gap-3">
        <button 
           id="stats-btn" 
           class="
                  bg-[#343A40]
                  rounded-xl
                  px-4 py-2
                  ">
          Stats
        </button>
        <select
            id="type-selector"
            class="
                   bg-[#343A40]
                   rounded-xl
                   px-4 py-2
                   ">
          <option value="strength">strength</option>
          <option value="cardio">cardio</option>
        </select>
      </div>
      <button
          id="done-btn"
          class="
                 w-32 h-32
                 rounded-full
                 text-white font-semibold tracking-wider
                 bg-gradient-to-br from-indigo-500 via-violet-500 to-fuchsia-500
                 shadow-lg shadow-violet-500/40
                 hover:scale-105 active:scale-95
                 transition-all duration-200 ease-out
                 flex items-center justify-center
                 relative overflow-hidden
                 ">
        <span class="z-10">DONE</span>

        <!-- glow -->
        <div class="absolute inset-0 opacity-30 blur-xl bg-white/20"></div>
      </button>
      <button id="debug-btn">debug OFF</button>
      <button id="empty-btn">empty</button>
    </div>

    <!-- STATS DIALOG -->
    <dialog
        id="stats-dialog"
        class="
               w-[90%] max-w-md
               rounded-2xl
               bg-[#343A40]
               text-white
               p-0 m-auto
               backdrop:bg-black/60
               "
        >
      <div class="p-6 flex flex-col gap-6">

        <div class="flex justify-between items-center">
          <h2 class="text-xl font-bold">Stats</h2>
          <button
              id="close-dialog-btn"
              class="
                     px-3 py-1
                     rounded-lg
                     bg-[#495057]
                     hover:bg-[#6C757D]
                     "
              >
              ✕
          </button>
        </div>

        <div>
          <h3 class="text-sm text-gray-400 mb-2">Workout History</h3>
          <ul id="history-list" class="space-y-2">
          </ul>
        </div>
        <!-- TODO: maybe add distribution here?? -->
      </div>
    </dialog>
  </body>

</html>
